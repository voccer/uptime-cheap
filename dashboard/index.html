<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site Monitor</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #07070f;
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.16);
      --text: #e2e8f0;
      --muted: rgba(255,255,255,0.35);
      --green: #22c55e;
      --red: #ef4444;
      --accent: #818cf8;
      --accent-dim: rgba(129,140,248,0.15);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      line-height: 1.5;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 10% 0%, rgba(129,140,248,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 90% 100%, rgba(34,197,94,0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Header ─────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(7,7,15,0.75);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      cursor: pointer;
    }

    .logo-mark {
      width: 34px; height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, #6366f1 0%, #22c55e 100%);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .logo-text {
      font-size: 17px; font-weight: 700; letter-spacing: -0.3px;
      background: linear-gradient(135deg, #e2e8f0 40%, #a5b4fc);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .header-right { display: flex; align-items: center; gap: 16px; }

    .overall-badge {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 20px;
      font-size: 12px; font-weight: 600; letter-spacing: 0.3px;
      transition: all 0.3s;
    }
    .overall-badge.up   { background: rgba(34,197,94,0.12); color: var(--green); border: 1px solid rgba(34,197,94,0.25); }
    .overall-badge.down { background: rgba(239,68,68,0.12);  color: var(--red);   border: 1px solid rgba(239,68,68,0.25); }
    .overall-badge .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
    .overall-badge.up .dot   { animation: pulse-g 2s infinite; }
    .overall-badge.down .dot { animation: pulse-r 1s infinite; }

    .refresh-label { font-size: 12px; color: var(--muted); }

    .btn-link {
      font-size: 12px; color: var(--muted);
      background: none; border: none; cursor: pointer;
      padding: 5px 10px; border-radius: 6px;
      text-decoration: none;
      transition: color 0.2s, background 0.2s;
    }
    .btn-link:hover { color: var(--text); background: var(--surface-hover); }

    /* ─── Main ─────────────────────────────────── */
    main {
      position: relative; z-index: 1;
      max-width: 900px; margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ─── Login ─────────────────────────────────── */
    .login-wrap {
      display: flex; align-items: center; justify-content: center;
      min-height: calc(100vh - 64px);
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      width: 100%; max-width: 400px;
      text-align: center;
    }

    .login-icon {
      width: 56px; height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, #6366f1, #22c55e);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }

    .login-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .login-card p  { font-size: 13px; color: var(--muted); margin-bottom: 24px; }

    .login-card input {
      width: 100%; padding: 10px 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-size: 14px; outline: none;
      transition: border-color 0.2s;
      margin-bottom: 12px;
    }
    .login-card input:focus { border-color: var(--accent); }

    .login-error {
      font-size: 12px; color: var(--red);
      margin-bottom: 12px; min-height: 16px;
    }

    .btn-login {
      width: 100%; padding: 10px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-login:hover { opacity: 0.9; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ─── Add Site ───────────────────────────────── */
    .add-bar {
      display: flex; gap: 10px;
      margin-bottom: 36px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 14px;
    }

    .add-bar input {
      flex: 1; padding: 9px 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-size: 14px; transition: border-color 0.2s; outline: none;
    }
    .add-bar input::placeholder { color: var(--muted); }
    .add-bar input:focus { border-color: var(--accent); }

    .add-bar select {
      padding: 9px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-size: 14px; cursor: pointer; outline: none;
      transition: border-color 0.2s;
    }
    .add-bar select:focus { border-color: var(--accent); }
    .add-bar select option { background: #1e1e30; }

    .btn-add {
      padding: 9px 20px; background: var(--accent); color: #fff;
      border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-add:hover  { opacity: 0.9; }
    .btn-add:active { transform: scale(0.97); }

    /* ─── Section header ─────────────────────────── */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .section-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
    .site-count    { font-size: 12px; color: var(--muted); }

    /* ─── Site Card ──────────────────────────────── */
    .sites-list { display: flex; flex-direction: column; gap: 12px; }

    .site-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px 24px;
      transition: border-color 0.25s, background 0.25s;
    }
    .site-card:hover        { border-color: var(--border-hover); background: var(--surface-hover); }
    .site-card.is-down      { border-color: rgba(239,68,68,0.25); background: rgba(239,68,68,0.04); }
    .site-card.is-paused    { opacity: 0.55; border-style: dashed; }
    .site-card.is-paused:hover { opacity: 0.75; }

    .paused-badge {
      padding: 3px 8px; border-radius: 20px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
      background: rgba(255,255,255,0.08); color: var(--muted);
    }

    .card-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }

    .site-meta  { display: flex; align-items: center; gap: 12px; }

    .status-ring { position: relative; width: 14px; height: 14px; flex-shrink: 0; }
    .status-ring .inner { position: absolute; inset: 3px; border-radius: 50%; }
    .status-ring .outer { position: absolute; inset: 0; border-radius: 50%; opacity: 0; }
    .status-ring.up .inner   { background: var(--green); }
    .status-ring.up .outer   { background: var(--green); animation: ripple 2s ease-out infinite; }
    .status-ring.down .inner { background: var(--red); }
    .status-ring.down .outer { background: var(--red); animation: ripple 1s ease-out infinite; }

    .site-name-wrap { line-height: 1.3; }
    .site-name { font-size: 15px; font-weight: 600; }
    .site-url  { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .card-right { display: flex; align-items: center; gap: 12px; }

    .status-pill {
      padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
    }
    .status-pill.up   { background: rgba(34,197,94,0.15);  color: var(--green); }
    .status-pill.down { background: rgba(239,68,68,0.15);   color: var(--red); }

    .btn-pause {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 13px; line-height: 1;
      padding: 4px 6px; border-radius: 6px; white-space: nowrap;
      transition: color 0.2s, background 0.2s;
    }
    .btn-pause:hover { color: var(--text); background: rgba(255,255,255,0.08); }

    .btn-del {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 15px; line-height: 1;
      padding: 4px; border-radius: 6px;
      transition: color 0.2s, background 0.2s;
    }
    .btn-del:hover { color: var(--red); background: rgba(239,68,68,0.1); }

    .card-stats { display: flex; gap: 28px; margin-bottom: 14px; }
    .stat       { font-size: 12px; color: var(--muted); }
    .stat strong { display: block; font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 1px; }

    /* ─── Heartbeat ──────────────────────────────── */
    .heartbeat {
      display: flex; gap: 2px; align-items: flex-end;
      height: 36px; overflow: hidden;
    }

    .beat { flex: 1; border-radius: 2px; cursor: pointer; position: relative; transition: opacity 0.15s, transform 0.15s; }
    .beat.b-up      { background: var(--green); opacity: 0.75; }
    .beat.b-down    { background: var(--red);   opacity: 0.9; }
    .beat.b-unknown { background: rgba(255,255,255,0.1); min-height: 8px !important; opacity: 1; }
    .beat:hover     { opacity: 1 !important; transform: scaleY(1.1); }

    .beat-tip {
      display: none; position: absolute; bottom: calc(100% + 8px);
      left: 50%; transform: translateX(-50%);
      background: #1e1e30; border: 1px solid var(--border-hover);
      border-radius: 8px; padding: 7px 10px;
      font-size: 11px; white-space: nowrap; z-index: 20;
      pointer-events: none; color: var(--text); line-height: 1.6;
    }
    .beat:hover .beat-tip { display: block; }

    .hb-labels {
      display: flex; justify-content: space-between;
      margin-top: 6px; font-size: 10px; color: var(--muted);
    }

    /* ─── States ─────────────────────────────────── */
    .loading-state, .empty-state, .error-state {
      text-align: center; padding: 100px 0; color: var(--muted);
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.08); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    .empty-icon  { font-size: 48px; margin-bottom: 16px; }
    .error-detail { font-size: 12px; margin-top: 8px; opacity: 0.5; }

    /* ─── Animations ─────────────────────────────── */
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes pulse-g { 0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.5);  } 50% { box-shadow: 0 0 0 5px rgba(34,197,94,0); } }
    @keyframes pulse-r { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.6);  } 50% { box-shadow: 0 0 0 5px rgba(239,68,68,0); } }
    @keyframes ripple  { 0% { opacity: 0.6; transform: scale(0.6); } 100% { opacity: 0; transform: scale(1); } }
    @keyframes fadeIn  { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .site-card { animation: fadeIn 0.3s ease both; }
  </style>
</head>
<body>

<header>
  <div class="logo" onclick="goPublic()">
    <div class="logo-mark">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
    </div>
    <span class="logo-text">Site Monitor</span>
  </div>
  <div class="header-right">
    <div id="overall-badge" class="overall-badge up">
      <div class="dot"></div>
      <span id="overall-text">All systems operational</span>
    </div>
    <span class="refresh-label" id="refresh-label">—</span>
    <span id="header-nav"></span>
  </div>
</header>

<main id="main"></main>

<script>
  const API = '__API_URL__';
  const $ = id => document.getElementById(id);

  // ── Auth state ──────────────────────────────────
  let adminToken = localStorage.getItem('sm_token') || null;

  const isAdminRoute = () => location.hash === '#admin';
  const isLoggedIn   = () => !!adminToken;

  // ── Routing ─────────────────────────────────────
  window.addEventListener('hashchange', () => route());
  window.addEventListener('load', () => route());

  const goPublic = () => { location.hash = ''; };
  const goAdmin  = () => { location.hash = '#admin'; };

  const logout = () => {
    adminToken = null;
    localStorage.removeItem('sm_token');
    goAdmin();
  };

  const route = () => {
    stopAutoRefresh();
    if (isAdminRoute()) {
      isLoggedIn() ? renderAdmin() : renderLogin();
    } else {
      renderPublic();
    }
    renderHeaderNav();
  };

  const renderHeaderNav = () => {
    const nav = $('header-nav');
    if (isAdminRoute() && isLoggedIn()) {
      nav.innerHTML = `<button class="btn-link" onclick="logout()">Logout</button>`;
    } else if (isAdminRoute()) {
      nav.innerHTML = `<button class="btn-link" onclick="goPublic()">← Status</button>`;
    } else {
      nav.innerHTML = `<button class="btn-link" onclick="goAdmin()">Admin →</button>`;
    }
  };

  // ── API helpers ──────────────────────────────────
  const api = async (path, opts = {}) => {
    if (adminToken) {
      opts.headers = { ...(opts.headers || {}), 'Authorization': `Bearer ${adminToken}` };
    }
    const r = await fetch(API + path, opts);
    if (r.status === 401) {
      adminToken = null;
      localStorage.removeItem('sm_token');
      renderLogin();
      return null;
    }
    return r.json();
  };

  // ── Helpers ──────────────────────────────────────
  const uptime = beats => {
    if (!beats.length) return '—';
    const pct = beats.filter(b => b.ok).length / beats.length * 100;
    return pct.toFixed(pct === 100 ? 0 : 1) + '%';
  };

  const avgLatency = beats => {
    const valid = beats.filter(b => b.latency_ms != null);
    if (!valid.length) return '—';
    return Math.round(valid.reduce((s, b) => s + +b.latency_ms, 0) / valid.length) + ' ms';
  };

  const timeAgo = iso => {
    if (!iso) return '—';
    const sec = Math.round((Date.now() - new Date(iso)) / 1000);
    if (sec < 60) return sec + 's ago';
    if (sec < 3600) return Math.floor(sec / 60) + 'm ago';
    return Math.floor(sec / 3600) + 'h ago';
  };

  const fmt = iso => new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

  // ── Beat bar ─────────────────────────────────────
  const beatBar = b => {
    if (!b) return '<div class="beat b-unknown" style="height:10px"></div>';
    const latMs = b.latency_ms != null ? +b.latency_ms : null;
    const h = !b.ok ? 34 : !latMs ? 22 : Math.min(34, Math.max(14, 14 + latMs / 25));
    const tip = b.ok
      ? `${fmt(b.timestamp)}<br>${latMs != null ? latMs + ' ms' : '—'}`
      : `${fmt(b.timestamp)}<br>DOWN`;
    return `<div class="beat ${b.ok ? 'b-up' : 'b-down'}" style="height:${h}px"><div class="beat-tip">${tip}</div></div>`;
  };

  // ── Card renderer ────────────────────────────────
  const renderCard = (site, beats, idx, showControls = false) => {
    const isPaused = !!site.paused;
    const isDown   = !isPaused && site.status === 'DOWN';
    const ringCls  = isPaused || !isDown ? 'up' : 'down';
    const interval = site.check_interval_minutes || 1;

    const pad    = Math.max(0, 90 - beats.length);
    const padded = [...Array(pad).fill(null), ...beats];
    const last   = beats[beats.length - 1];

    const classes = ['site-card', isDown ? 'is-down' : '', isPaused ? 'is-paused' : ''].filter(Boolean).join(' ');

    const statusEl = isPaused
      ? `<span class="paused-badge">PAUSED</span>`
      : `<span class="status-pill ${isDown ? 'down' : 'up'}">${isDown ? 'DOWN' : 'UP'}</span>`;

    const controls = showControls ? `
      <button class="btn-pause" onclick="togglePause('${site.site_id}', ${isPaused})">${isPaused ? '▶ Resume' : '⏸ Pause'}</button>
      <button class="btn-del"   onclick="delSite('${site.site_id}')" title="Remove">✕</button>
    ` : '';

    return `
      <div class="${classes}" style="animation-delay:${idx * 0.05}s">
        <div class="card-top">
          <div class="site-meta">
            <div class="status-ring ${ringCls}"><div class="outer"></div><div class="inner"></div></div>
            <div class="site-name-wrap">
              <div class="site-name">${site.name}</div>
              <div class="site-url">${site.url}</div>
            </div>
          </div>
          <div class="card-right">
            ${statusEl}
            ${controls}
          </div>
        </div>
        <div class="card-stats">
          <div class="stat"><strong>${uptime(beats)}</strong>Uptime (30m)</div>
          <div class="stat"><strong>${avgLatency(beats)}</strong>Avg Response</div>
          <div class="stat"><strong>${timeAgo(last?.timestamp)}</strong>Last Check</div>
          <div class="stat"><strong>${interval === 1 ? '1 min' : interval + ' min'}</strong>Interval</div>
        </div>
        <div class="heartbeat-wrap">
          <div class="heartbeat">${padded.map(beatBar).join('')}</div>
          <div class="hb-labels"><span>30 min ago</span><span>now</span></div>
        </div>
      </div>`;
  };

  // ── Overall badge ────────────────────────────────
  const updateBadge = sites => {
    const down = sites.filter(s => s.status === 'DOWN' && !s.paused).length;
    $('overall-badge').className = `overall-badge ${down > 0 ? 'down' : 'up'}`;
    $('overall-text').textContent = down > 0 ? `${down} site${down > 1 ? 's' : ''} down` : 'All systems operational';
  };

  // ── Load sites + beats ───────────────────────────
  const loadData = async () => {
    const sites = await api('/sites');
    if (!sites) return null;
    const beatsAll = await Promise.all(sites.map(s => api(`/sites/${s.site_id}/beats`)));
    return { sites, beatsAll };
  };

  // ── Auto-refresh ─────────────────────────────────
  let refreshTimer = null;
  const stopAutoRefresh  = () => { clearInterval(refreshTimer); refreshTimer = null; };
  const startAutoRefresh = fn => { stopAutoRefresh(); refreshTimer = setInterval(fn, 30_000); };

  // ── PUBLIC view ──────────────────────────────────
  const renderPublic = async () => {
    $('main').innerHTML = '<div class="loading-state"><div class="spinner"></div>Loading…</div>';
    await loadPublic();
    startAutoRefresh(loadPublic);
  };

  const loadPublic = async () => {
    try {
      const data = await loadData();
      if (!data) return;
      const { sites, beatsAll } = data;

      updateBadge(sites);
      $('refresh-label').textContent = 'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

      if (!sites.length) {
        $('main').innerHTML = `
          <div class="section-header"><span class="section-title">Monitors</span></div>
          <div class="empty-state"><div class="empty-icon">📡</div><p>No monitors configured yet.</p></div>`;
        return;
      }

      $('main').innerHTML = `
        <div class="section-header">
          <span class="section-title">Monitors</span>
          <span class="site-count">${sites.length} monitor${sites.length !== 1 ? 's' : ''}</span>
        </div>
        <div class="sites-list">${sites.map((s, i) => renderCard(s, beatsAll[i] ?? [], i, false)).join('')}</div>`;
    } catch (e) {
      $('main').innerHTML = `<div class="error-state"><div class="empty-icon">⚠️</div><p>Cannot reach API</p><p class="error-detail">${e.message}</p></div>`;
    }
  };

  // ── LOGIN view ───────────────────────────────────
  const renderLogin = () => {
    stopAutoRefresh();
    $('main').innerHTML = `
      <div class="login-wrap">
        <div class="login-card">
          <div class="login-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </div>
          <h2>Admin Access</h2>
          <p>Enter your access token to manage monitors.</p>
          <input id="inp-token" type="password" placeholder="Access token" autocomplete="current-password" />
          <div class="login-error" id="login-error"></div>
          <button class="btn-login" id="btn-login" onclick="login()">Sign in</button>
        </div>
      </div>`;

    $('inp-token').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
    setTimeout(() => $('inp-token')?.focus(), 50);
  };

  const login = async () => {
    const token = $('inp-token').value.trim();
    if (!token) return;

    const btn = $('btn-login');
    btn.disabled = true;
    btn.textContent = 'Signing in…';
    $('login-error').textContent = '';

    try {
      const res = await fetch(API + '/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token }),
      });

      if (res.ok) {
        adminToken = token;
        localStorage.setItem('sm_token', token);
        renderAdmin();
        renderHeaderNav();
      } else {
        $('login-error').textContent = 'Invalid token. Please try again.';
        $('inp-token').value = '';
        $('inp-token').focus();
      }
    } catch (e) {
      $('login-error').textContent = 'Cannot reach API: ' + e.message;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  };

  // ── ADMIN view ───────────────────────────────────
  const renderAdmin = async () => {
    $('main').innerHTML = '<div class="loading-state"><div class="spinner"></div>Loading…</div>';
    await loadAdmin();
    startAutoRefresh(loadAdmin);
  };

  const loadAdmin = async () => {
    try {
      const data = await loadData();
      if (!data) return;
      const { sites, beatsAll } = data;

      updateBadge(sites);
      $('refresh-label').textContent = 'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

      const list = sites.length
        ? `<div class="sites-list">${sites.map((s, i) => renderCard(s, beatsAll[i] ?? [], i, true)).join('')}</div>`
        : `<div class="empty-state"><div class="empty-icon">📡</div><p>No monitors yet. Add your first site above.</p></div>`;

      $('main').innerHTML = `
        <div class="add-bar">
          <input id="inp-name" type="text" placeholder="Name  (e.g. My App)" />
          <input id="inp-url"  type="text" placeholder="URL  (e.g. https://example.com)" />
          <select id="inp-interval" title="Check interval">
            <option value="1">Every 1 min</option>
            <option value="2">Every 2 min</option>
            <option value="5">Every 5 min</option>
            <option value="10">Every 10 min</option>
            <option value="15">Every 15 min</option>
            <option value="30">Every 30 min</option>
            <option value="60">Every 60 min</option>
          </select>
          <button class="btn-add" onclick="addSite()">+ Add Site</button>
        </div>
        <div class="section-header">
          <span class="section-title">Monitors</span>
          <span class="site-count">${sites.length ? sites.length + ' monitor' + (sites.length !== 1 ? 's' : '') : ''}</span>
        </div>
        ${list}`;

      $('inp-name').addEventListener('keydown', e => { if (e.key === 'Enter') addSite(); });
      $('inp-url').addEventListener('keydown',  e => { if (e.key === 'Enter') addSite(); });
    } catch (e) {
      $('main').innerHTML = `<div class="error-state"><div class="empty-icon">⚠️</div><p>Cannot reach API</p><p class="error-detail">${e.message}</p></div>`;
    }
  };

  // ── Admin actions ────────────────────────────────
  const addSite = async () => {
    const name     = $('inp-name').value.trim();
    const url      = $('inp-url').value.trim();
    const interval = parseInt($('inp-interval').value, 10);
    if (!name || !url) { $('inp-name').focus(); return; }

    await api('/sites', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, url, check_interval_minutes: interval }),
    });
    loadAdmin();
  };

  const togglePause = async (id, isPaused) => {
    await api(`/sites/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ paused: !isPaused }),
    });
    loadAdmin();
  };

  const delSite = async id => {
    if (!confirm('Remove this monitor?')) return;
    await api(`/sites/${id}`, { method: 'DELETE' });
    loadAdmin();
  };
</script>
</body>
</html>
